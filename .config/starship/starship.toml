"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false 
scan_timeout = 8
# Give Python a little more breathing room on slower shell starts.
command_timeout = 1500
format = "$directory$hostname$git_branch$git_status$python$nodejs$dart$cmd_duration$line_break$character"
